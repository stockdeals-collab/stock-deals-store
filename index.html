<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒 STOCK DEALS - Clearance Sale</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .hero-gradient { background: linear-gradient(135deg, #f97316 0%, #dc2626 50%, #eab308 100%); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-yellow-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // STOCK DEALS Products
    const products = [
      { id: 1, name: '🔥 Gaming Headset 41% OFF', price: 29, orig: 69, stock: 47, image: 'https://images.unsplash.com/photo-1579710039144-85d56a954b9b?w=400&fit=crop' },
      { id: 2, name: '⚡ Wireless Mouse Deal', price: 19, orig: 45, stock: 123, image: 'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400&fit=crop' },
      { id: 3, name: '💻 Laptop Stand Stock', price: 39, orig: 89, stock: 23, image: 'https://images.unsplash.com/photo-1588178398406-3b2e6a3f67e7?w=400&fit=crop' },
      { id: 4, name: '📱 Phone Case Clearance', price: 12, orig: 29, stock: 89, image: 'https://images.unsplash.com/photo-1587563871167-2e7c383d08f1?w=400&fit=crop' }
    ];

    // Navbar
    const Navbar = () => (
      <nav className="bg-gradient-to-r from-orange-600 to-red-600 text-white shadow-2xl sticky top-0 z-50 p-4">
        <div className="max-w-6xl mx-auto flex justify-between items-center">
          <h1 className="text-3xl font-black bg-gradient-to-r from-yellow-300 to-orange-200 bg-clip-text text-transparent">
            🛒 STOCK DEALS
          </h1>
          <button className="bg-white/20 px-6 py-2 rounded-xl font-bold hover:bg-white/30 transition-all">
            Cart (0)
          </button>
        </div>
      </nav>
    );

    // Product Card
    const ProductCard = ({ product, onAddToCart }) => (
      <div className="bg-white rounded-3xl shadow-xl card-hover overflow-hidden max-w-sm mx-auto">
        <div className="h-64 overflow-hidden relative group">
          <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform" />
          <div className="absolute top-4 left-4 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold">
            🔥 {Math.round((1 - product.price/product.orig)*100)}% OFF
          </div>
        </div>
        <div className="p-6">
          <div className="flex items-center mb-3">
            <svg className="w-5 h-5 text-green-500 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" />
            </svg>
            <span className="text-green-600 font-semibold text-sm">Ready to Ship</span>
          </div>
          <h3 className="font-bold text-xl mb-3 line-clamp-2">{product.name}</h3>
          <div className="flex items-center space-x-3 mb-6">
            <span className="text-3xl font-black text-orange-600">${product.price}</span>
            <span className="text-lg text-gray-500 line-through">${product.orig}</span>
          </div>
          <div className="flex items-center justify-between text-sm mb-4">
            <span className="text-gray-600">Stock: {product.stock}</span>
            <button onClick={() => onAddToCart(product)} 
              className="bg-gradient-to-r from-orange-500 to-red-500 text-white px-8 py-3 rounded-xl font-bold hover:from-orange-600 hover:to-red-600 shadow-lg transition-all">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    );

    // Main App
    const App = () => {
      const [cart, setCart] = useState([]);

      const addToCart = (product) => {
        setCart([...cart, product]);
        alert(`✅ ${product.name} added to cart!`);
      };

      return (
        <div className="min-h-screen">
          <Navbar />
          
          {/* Hero */}
          <div className="hero-gradient text-white text-center py-24 px-4 rounded-3xl mx-4 mt-4 shadow-2xl">
            <h1 className="text-5xl md:text-7xl font-black mb-6 bg-gradient-to-r from-yellow-300 via-white to-orange-200 bg-clip-text text-transparent drop-shadow-2xl">
              STOCK DEALS
            </h1>
            <p className="text-xl md:text-2xl mb-8 max-w-3xl mx-auto font-semibold opacity-90">
              🔥 Massive clearance | Ready-to-ship worldwide | Limited stock
            </p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-2xl mx-auto text-lg font-bold">
              <div className="bg-white/20 p-6 rounded-2xl backdrop-blur-xl">🇺🇸 USA 2-4 days</div>
              <div className="bg-white/20 p-6 rounded-2xl backdrop-blur-xl">🇬🇧 UK 3-5 days</div>
              <div className="bg-white/20 p-6 rounded-2xl backdrop-blur-xl">🇵🇰 Pakistan Ready</div>
            </div>
          </div>

          {/* Products */}
          <div className="max-w-7xl mx-auto px-4 py-16">
            <h2 className="text-4xl font-black text-center mb-16 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
              🔥 HOT DEALS
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
              {products.map(product => (
                <ProductCard key={product.id} product={product} onAddToCart={addToCart} />
              ))}
            </div>
          </div>

          {/* Cart Summary */}
          {cart.length > 0 && (
            <div className="fixed bottom-8 right-8 bg-gradient-to-r from-orange-500 to-red-500 text-white p-6 rounded-3xl shadow-2xl">
              <div className="flex items-center space-x-3">
                <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center">
                  🛒 {cart.length}
                </div>
                <div>
                  <div className="font-bold text-lg">${cart.reduce((sum, p) => sum + p.price, 0).toFixed(2)}</div>
                  <button className="text-sm underline">View Cart</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
